services:
  - type: web
    name: groweasy-api
    env: docker
    dockerfilePath: ./apps/api/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: FRONTEND_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
